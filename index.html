<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podator - Vérification de Podcasts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="month-header">
        <button id="prevMonth" class="nav-btn">&larr;</button>
        <h1 id="monthYear"></h1>
        <button id="nextMonth" class="nav-btn">&rarr;</button>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Podcasts comptabilisés</span>
          <span class="stat-value" id="totalPodcasts">113</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Erreurs aujourd'hui</span>
          <span class="stat-value" id="todayErrors">—</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button id="checkNow" class="check-btn">Vérifier maintenant</button>
      <span class="last-check" id="lastCheck"></span>
    </div>

    <div class="calendar-wrapper">
      <div class="weekdays">
        <div class="weekday">LUN</div>
        <div class="weekday">MAR</div>
        <div class="weekday">MER</div>
        <div class="weekday">JEU</div>
        <div class="weekday">VEN</div>
        <div class="weekday">SAM</div>
        <div class="weekday">DIM</div>
      </div>
      <div class="calendar" id="calendar"></div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="modal" id="detailModal">
      <div class="modal-content">
        <button class="modal-close" id="closeModal">&times;</button>
        <h3 id="modalDate"></h3>
        <div id="modalDetails"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
